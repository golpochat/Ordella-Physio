      PATIENT_SERVICE_URL: http://patient-service:3053
      APPOINTMENT_SERVICE_URL: http://appointment-service:3054
      NOTES_SERVICE_URL: http://notes-service:3055
      TENANT_SERVICE_URL: http://tenant-service:3052
    depends_on:
      postgres:
        condition: service_healthy
      patient-service:
        condition: service_started
      appointment-service:
        condition: service_started
      notes-service:
        condition: service_started
    networks:
      - ordella-physio-network

  ai-service:
