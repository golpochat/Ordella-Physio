      PORT: 3075
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_ai?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      CORS_ORIGIN: "*"
      AI_ENCRYPTION_KEY: ${AI_ENCRYPTION_KEY:-change-me-local-ai-encryption-key-32chars}
      DEFAULT_AI_PROVIDER: ${DEFAULT_AI_PROVIDER:-LOCAL}
