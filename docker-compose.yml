      - api-gateway
    networks:
      - ordella-physio-network

  # ---------------------------------------------------------------------------
  # Gateway load balancer (Traefik)
  # ---------------------------------------------------------------------------
  gateway-load-balancer:
    image: traefik:v3.3
    container_name: ordella-physio-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --ping=true
    ports:
      - "80:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8082}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ordella-physio-network
    labels:
      - traefik.enable=false

  # ---------------------------------------------------------------------------
  # Observability stack
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.4
    container_name: ordella-physio-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ordella-physio-loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ordella-physio-network

  promtail:
    image: grafana/promtail:2.9.4
    container_name: ordella-physio-promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - ordella-physio-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ordella-physio-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme-grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    volumes:
      - ordella-physio-grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - ordella-physio-network

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ordella-physio-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ordella-physio-prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - ordella-physio-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ordella-physio-alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    depends_on:
      - prometheus
    networks:
      - ordella-physio-network

  tempo:
    image: grafana/tempo:2.4.1
    container_name: ordella-physio-tempo
    restart: unless-stopped
    ports:
      - "${TEMPO_PORT:-3200}:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ordella-physio-tempo_data:/var/tempo
    command:
      - -config.file=/etc/tempo.yaml
    networks:
      - ordella-physio-network
