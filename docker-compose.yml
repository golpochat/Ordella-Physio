name: ordella-physio

# Ordella Physio — full local stack
# Usage: docker compose up -d
# Lightweight dev: docker compose -f docker-compose.dev.yml up -d
# Lightweight dev: docker compose -f docker-compose.dev.yml up -d

networks:
  ordella-physio-network:
    name: ordella-physio-network
    driver: bridge

volumes:
  ordella-physio-postgres_data:
  ordella-physio-redis_data:
  ordella-physio-nats_data:
  ordella-physio-loki_data:
  ordella-physio-prometheus_data:
  ordella-physio-grafana_data:
  ordella-physio-tempo_data:

x-jwt-secret: &jwt-secret ${JWT_ACCESS_SECRET:-change-me-local-jwt-secret-min-32-chars}
x-postgres-user: &postgres-user ${POSTGRES_USER:-physio}
x-postgres-password: &postgres-password ${POSTGRES_PASSWORD:-physio}

services:
  # ---------------------------------------------------------------------------
  # Data & messaging (required by microservices)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: ordella-physio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: *postgres-user
      POSTGRES_PASSWORD: *postgres-password
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - ordella-physio-postgres_data:/var/lib/postgresql/data
      - ./infrastructure/deployment-layer/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    networks:
      - ordella-physio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U physio"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ordella-physio-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ordella-physio-redis_data:/data
    networks:
      - ordella-physio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10
    container_name: ordella-physio-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ordella-physio-nats_data:/var/lib/nats
    networks:
      - ordella-physio-network

  # ---------------------------------------------------------------------------
  # Backend microservices
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-auth-service:latest
    container_name: ordella-physio-auth-service
    restart: unless-stopped
    env_file:
      - infrastructure/deployment-layer/.env.local
    environment:
      PORT: 3051
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_auth?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - ordella-physio-network

  tenant-service:
    build:
      context: ./services/tenant-service
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-tenant-service:latest
    container_name: ordella-physio-tenant-service
    restart: unless-stopped
    env_file:
      - infrastructure/deployment-layer/.env.local
    environment:
      PORT: 3052
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_tenant?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      AUTH_SERVICE_URL: http://auth-service:3051
      APPOINTMENT_SERVICE_URL: http://appointment-service:3054
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      appointment-service:
        condition: service_started
    networks:
      - ordella-physio-network

  patient-service:
    build:
      context: ./services/patient-service
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-patient-service:latest
    container_name: ordella-physio-patient-service
    restart: unless-stopped
    env_file:
      - infrastructure/deployment-layer/.env.local
    environment:
      PORT: 3053
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_patient?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-physio-network

  appointment-service:
    build:
      context: ./services/appointment-service
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-appointment-service:latest
    container_name: ordella-physio-appointment-service
    restart: unless-stopped
    env_file:
      - infrastructure/deployment-layer/.env.local
    environment:
      PORT: 3054
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_appointment?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
      PATIENT_SERVICE_URL: http://patient-service:3053
      STAFF_SERVICE_URL: http://staff-service:3069
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-physio-network

  notes-service:
