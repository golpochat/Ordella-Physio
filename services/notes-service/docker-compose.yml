services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ordella
      POSTGRES_PASSWORD: ordella
      POSTGRES_DB: ordella_notes
    ports:
      - "5437:5432"
    volumes:
      - notes_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordella -d ordella_notes"]
      interval: 5s
      timeout: 5s
      retries: 5

  notes-service:
    build:
      context: ../..
      dockerfile: services/notes-service/Dockerfile
    ports:
      - "3055:3055"
    environment:
      PORT: 3055
      NODE_ENV: production
      DATABASE_URL: postgresql://ordella:ordella@postgres:5432/ordella_notes?schema=public
      JWT_ACCESS_SECRET: change-me-jwt-secret-min-32-characters-long
      NATS_URL: nats://host.docker.internal:4222
      REDIS_URL: redis://host.docker.internal:6379
      PATIENT_SERVICE_URL: http://host.docker.internal:3053
      APPOINTMENT_SERVICE_URL: http://host.docker.internal:3054
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  notes_postgres_data:
