services:
  billing-service:
    build:
      context: ../..
      dockerfile: services/billing-service/Dockerfile
    ports:
      - "3056:3056"
    environment:
      PORT: 3056
      NODE_ENV: development
      DATABASE_URL: postgresql://ordella:ordella@localhost:5437/ordella_billing?schema=public
      JWT_ACCESS_SECRET: change-me-jwt-secret-min-32-characters-long
      NATS_URL: nats://localhost:4222
      REDIS_URL: redis://localhost:6379
      PAYMENT_SERVICE_URL: http://localhost:4007
      PATIENT_SERVICE_URL: http://localhost:3053
      APPOINTMENT_SERVICE_URL: http://localhost:3054
