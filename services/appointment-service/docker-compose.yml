services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ordella
      POSTGRES_PASSWORD: ordella
      POSTGRES_DB: ordella_appointment
    ports:
      - "5436:5432"
    volumes:
      - appointment_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordella -d ordella_appointment"]
      interval: 5s
      timeout: 5s
      retries: 5

  appointment-service:
    build:
      context: ../..
      dockerfile: services/appointment-service/Dockerfile
    ports:
      - "3054:3054"
    environment:
      PORT: 3054
      NODE_ENV: production
      DATABASE_URL: postgresql://ordella:ordella@postgres:5432/ordella_appointment?schema=public
      JWT_ACCESS_SECRET: change-me-jwt-secret-min-32-characters-long
      NATS_URL: nats://host.docker.internal:4222
      REDIS_URL: redis://host.docker.internal:6379
      PATIENT_SERVICE_URL: http://host.docker.internal:3053
      TENANT_SERVICE_URL: http://host.docker.internal:3052
      NOTIFICATION_SERVICE_URL: http://host.docker.internal:3058
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  appointment_postgres_data:
