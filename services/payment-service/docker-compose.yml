services:
  payment-service:
    build:
      context: ../..
      dockerfile: services/payment-service/Dockerfile
    ports:
      - "3057:3057"
    environment:
      PORT: 3057
      NODE_ENV: development
      DATABASE_URL: postgresql://ordella:ordella@localhost:5437/ordella_payment?schema=public
      JWT_ACCESS_SECRET: change-me-jwt-secret-min-32-characters-long
      NATS_URL: nats://localhost:4222
      REDIS_URL: redis://localhost:6379
      BILLING_SERVICE_URL: http://localhost:3056
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      PAYMENT_GATEWAY: mock
