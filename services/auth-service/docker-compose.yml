services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ordella
      POSTGRES_PASSWORD: ordella
      POSTGRES_DB: ordella_auth
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordella -d ordella_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ../..
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "3051:3051"
    environment:
      PORT: 3051
      NODE_ENV: production
      DATABASE_URL: postgresql://ordella:ordella@postgres:5432/ordella_auth?schema=public
      JWT_SECRET: change-me-jwt-secret-min-32-characters-long
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      NATS_URL: nats://host.docker.internal:4222
      REDIS_URL: redis://host.docker.internal:6379
      PASSWORD_RESET_EXPIRES_IN: 1h
      EMAIL_VERIFICATION_EXPIRES_IN: 24h
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  auth_postgres_data:
