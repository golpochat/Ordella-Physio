services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ordella
      POSTGRES_PASSWORD: ordella
      POSTGRES_DB: ordella_tenant
    ports:
      - "5434:5432"
    volumes:
      - tenant_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordella -d ordella_tenant"]
      interval: 5s
      timeout: 5s
      retries: 5

  tenant-service:
    build:
      context: ../..
      dockerfile: services/tenant-service/Dockerfile
    ports:
      - "3052:3052"
    environment:
      PORT: 3052
      NODE_ENV: production
      DATABASE_URL: postgresql://ordella:ordella@postgres:5432/ordella_tenant?schema=public
      JWT_SECRET: change-me-jwt-secret-min-32-characters-long
      NATS_URL: nats://host.docker.internal:4222
      REDIS_URL: redis://host.docker.internal:6379
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  tenant_postgres_data:
