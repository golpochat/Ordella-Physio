services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ordella
      POSTGRES_PASSWORD: ordella
      POSTGRES_DB: ordella_patient
    ports:
      - "5435:5432"
    volumes:
      - patient_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordella -d ordella_patient"]
      interval: 5s
      timeout: 5s
      retries: 5

  patient-service:
    build:
      context: ../..
      dockerfile: services/patient-service/Dockerfile
    ports:
      - "3053:3053"
    environment:
      PORT: 3053
      NODE_ENV: production
      DATABASE_URL: postgresql://ordella:ordella@postgres:5432/ordella_patient?schema=public
      JWT_ACCESS_SECRET: change-me-jwt-secret-min-32-characters-long
      NATS_URL: nats://host.docker.internal:4222
      REDIS_URL: redis://host.docker.internal:6379
      NOTES_SERVICE_URL: http://host.docker.internal:3055
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  patient_postgres_data:
