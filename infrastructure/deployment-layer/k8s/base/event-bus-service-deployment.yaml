apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-bus-service
  labels:
    app: event-bus-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-bus-service
  template:
    metadata:
      labels:
        app: event-bus-service
        tier: backend
    spec:
      containers:
        - name: event-bus-service
          image: ghcr.io/ordella/event-bus-service:latest
          ports:
            - containerPort: 3060
            - containerPort: 4222
              name: nats
          env:
            - name: PORT
              value: "3060"
          envFrom:
            - configMapRef:
                name: global-config
            - secretRef:
                name: global-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3060
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3060
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
