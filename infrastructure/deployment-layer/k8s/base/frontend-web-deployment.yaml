apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-web
  labels:
    app: frontend-web
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-web
  template:
    metadata:
      labels:
        app: frontend-web
        tier: frontend
    spec:
      containers:
        - name: frontend-web
          image: ghcr.io/ordella/frontend-web:latest
          ports:
            - containerPort: 3010
          env:
            - name: PORT
              value: "3010"
          envFrom:
            - configMapRef:
                name: global-config
            - secretRef:
                name: global-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
