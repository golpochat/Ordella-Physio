apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ordella-ingress
  labels:
    app.kubernetes.io/part-of: ordella-physio
  annotations:
    # Placeholder — use nginx or traefik ingress controller annotations per cluster
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: api.ordella-physio.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
    - host: app.ordella-physio.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-web
                port:
                  number: 80
