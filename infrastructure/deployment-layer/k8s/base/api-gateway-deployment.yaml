apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: backend
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/ordella/api-gateway:latest
          ports:
            - containerPort: 3049
          env:
            - name: PORT
              value: "3049"
          envFrom:
            - configMapRef:
                name: global-config
            - secretRef:
                name: global-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3049
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3049
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
