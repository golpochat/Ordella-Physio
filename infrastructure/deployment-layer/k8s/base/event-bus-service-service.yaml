apiVersion: v1
kind: Service
metadata:
  name: event-bus-service
  labels:
    app: event-bus-service
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: event-bus-service
  ports:
    - name: http
      port: 3060
      targetPort: 3060
    - name: nats
      port: 4222
      targetPort: 4222
