apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  labels:
    app: billing-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
        tier: backend
    spec:
      containers:
        - name: billing-service
          image: ghcr.io/ordella/billing-service:latest
          ports:
            - containerPort: 3056
          env:
            - name: PORT
              value: "3056"
          envFrom:
            - configMapRef:
                name: global-config
            - secretRef:
                name: global-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3056
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3056
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
