apiVersion: v1
kind: Service
metadata:
  name: gateway-load-balancer
  labels:
    app: gateway-load-balancer
    tier: infra
spec:
  type: LoadBalancer
  selector:
    app: gateway-load-balancer
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
