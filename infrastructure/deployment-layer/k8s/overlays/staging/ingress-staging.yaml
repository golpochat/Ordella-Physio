apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ordella-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - api.staging.ordella-physio.com
        - app.staging.ordella-physio.com
      secretName: ordella-staging-tls
  rules:
    - host: api.staging.ordella-physio.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
    - host: app.staging.ordella-physio.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-web
                port:
                  number: 80
