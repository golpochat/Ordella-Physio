name: ordella-physio

# Ordella Physio — local deployment stack
# Usage: docker compose -f docker-compose.local.yml up -d

networks:
  ordella-network:
    name: ordella-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nats_data:
  loki_data:
  prometheus_data:
  grafana_data:
  tempo_data:

x-jwt-secret: &jwt-secret ${JWT_ACCESS_SECRET:-change-me-local-jwt-secret-min-32-chars}
x-postgres-user: &postgres-user ${POSTGRES_USER:-physio}
x-postgres-password: &postgres-password ${POSTGRES_PASSWORD:-physio}

services:
  # ---------------------------------------------------------------------------
  # Data & messaging (required by microservices)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: ordella_local_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: *postgres-user
      POSTGRES_PASSWORD: *postgres-password
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    networks:
      - ordella-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U physio"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: ordella_local_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - ordella-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10
    container_name: ordella_local_nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/var/lib/nats
    networks:
      - ordella-network

  # ---------------------------------------------------------------------------
  # Backend microservices
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: ../../
      dockerfile: services/auth-service/Dockerfile
    container_name: ordella_local_auth_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3051
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_auth?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - ordella-network

  tenant-service:
    build:
      context: ../../
      dockerfile: services/tenant-service/Dockerfile
    container_name: ordella_local_tenant_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3052
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_tenant?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      AUTH_SERVICE_URL: http://auth-service:3051
      APPOINTMENT_SERVICE_URL: http://appointment-service:3054
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      appointment-service:
        condition: service_started
    networks:
      - ordella-network

  patient-service:
    build:
      context: ../../
      dockerfile: services/patient-service/Dockerfile
    container_name: ordella_local_patient_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3053
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_patient?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-network

  appointment-service:
    build:
      context: ../../
      dockerfile: services/appointment-service/Dockerfile
    container_name: ordella_local_appointment_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3054
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_appointment?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-network

  notes-service:
    build:
      context: ../../
      dockerfile: services/notes-service/Dockerfile
    container_name: ordella_local_notes_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3055
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_notes?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-network

  billing-service:
    build:
      context: ../../
      dockerfile: services/billing-service/Dockerfile
    container_name: ordella_local_billing_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3056
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_billing?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_local_dev_stripe_secret_key}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_local_dev_stripe_webhook_secret}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-price_local_starter}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-price_local_pro}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-price_local_enterprise}
      TENANT_SERVICE_URL: http://tenant-service:3052
      FRONTEND_URL: http://localhost:3010
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-network

  payment-service:
    build:
      context: ../../
      dockerfile: services/payment-service/Dockerfile
    container_name: ordella_local_payment_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3057
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_payment?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-network

  communication-service:
    build:
      context: ../../
      dockerfile: services/communication-service/Dockerfile
    container_name: ordella_local_communication_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3058
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_communication?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-network

  reporting-service:
    build:
      context: ../../
      dockerfile: services/reporting-service/Dockerfile
    container_name: ordella_local_reporting_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3059
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_reporting?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - ordella-network

  messaging-service:
    build:
      context: ../../
      dockerfile: services/messaging-service/Dockerfile
    container_name: ordella_local_messaging_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3061
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_messaging?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - ordella-network

  notification-service:
    build:
      context: ../../
      dockerfile: services/notification-service/Dockerfile
    container_name: ordella_local_notification_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3062
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_notification?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - ordella-network

  ai-notes-service:
    build:
      context: ../../
      dockerfile: services/ai-notes-service/Dockerfile
    container_name: ordella_local_ai_notes_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3063
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_ai_notes?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      MAX_TOKENS: ${MAX_TOKENS:-2000}
      TEMPERATURE: ${TEMPERATURE:-0.3}
      PATIENT_SERVICE_URL: http://patient-service:3053
      APPOINTMENT_SERVICE_URL: http://appointment-service:3054
      NOTES_SERVICE_URL: http://notes-service:3055
      TENANT_SERVICE_URL: http://tenant-service:3052
    depends_on:
      postgres:
        condition: service_healthy
      patient-service:
        condition: service_started
      appointment-service:
        condition: service_started
      notes-service:
        condition: service_started
    networks:
      - ordella-network

  marketplace-service:
    build:
      context: ../../
      dockerfile: services/marketplace-service/Dockerfile
    container_name: ordella_local_marketplace_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3064
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_marketplace?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      MARKETPLACE_OAUTH_CALLBACK_URL: http://localhost:3049/marketplace/oauth/redirect
      MARKETPLACE_FRONTEND_CALLBACK_URL: http://localhost:3010/clinic/marketplace/oauth/callback
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DROPBOX_CLIENT_ID: ${DROPBOX_CLIENT_ID:-}
      DROPBOX_CLIENT_SECRET: ${DROPBOX_CLIENT_SECRET:-}
      ONEDRIVE_CLIENT_ID: ${ONEDRIVE_CLIENT_ID:-}
      ONEDRIVE_CLIENT_SECRET: ${ONEDRIVE_CLIENT_SECRET:-}
      ZOOM_CLIENT_ID: ${ZOOM_CLIENT_ID:-}
      ZOOM_CLIENT_SECRET: ${ZOOM_CLIENT_SECRET:-}
      APPOINTMENT_SERVICE_URL: http://appointment-service:3054
      NOTES_SERVICE_URL: http://notes-service:3055
      COMMUNICATION_SERVICE_URL: http://communication-service:3058
      BILLING_SERVICE_URL: http://billing-service:3056
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-network

  enterprise-service:
    build:
      context: ../../
      dockerfile: services/enterprise-service/Dockerfile
    container_name: ordella_local_enterprise_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3065
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_enterprise?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      ENTERPRISE_SSO_CALLBACK_URL: http://localhost:3049/enterprise/sso/oauth/callback
      ENTERPRISE_SAML_ACS_URL: http://localhost:3049/enterprise/sso/saml/acs
      ENTERPRISE_FRONTEND_CALLBACK_URL: http://localhost:3010/clinic/enterprise/sso/callback
      TENANT_SERVICE_URL: http://tenant-service:3052
    depends_on:
      postgres:
        condition: service_healthy
      tenant-service:
        condition: service_started
    networks:
      - ordella-network

  organization-service:
    build:
      context: ../../
      dockerfile: services/organization-service/Dockerfile
    container_name: ordella_local_organization_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3066
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_organization?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-network

  terminal-service:
    build:
      context: ../../
      dockerfile: services/terminal-service/Dockerfile
    container_name: ordella_local_terminal_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3067
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_terminal?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
    depends_on:
      postgres:
        condition: service_healthy
      tenant-service:
        condition: service_started
    networks:
      - ordella-network

  user-role-service:
    build:
      context: ../../
      dockerfile: services/user-role-service/Dockerfile
    container_name: ordella_local_user_role_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3068
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_user_role?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-network

  staff-service:
    build:
      context: ../../
      dockerfile: services/staff-service/Dockerfile
    container_name: ordella_local_staff_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3069
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_staff?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
      USER_ROLE_SERVICE_URL: http://user-role-service:3068
      APPOINTMENT_SERVICE_URL: http://appointment-service:3054
    depends_on:
      postgres:
        condition: service_healthy
      tenant-service:
        condition: service_started
      user-role-service:
        condition: service_started
      appointment-service:
        condition: service_started
    networks:
      - ordella-network

  event-bus-service:
    build:
      context: ../../
      dockerfile: services/event-bus-service/Dockerfile
    container_name: ordella_local_event_bus_service
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3060
      DATABASE_URL: postgresql://physio:physio@postgres:5432/ordella_event_bus?schema=public
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - ordella-network

  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    container_name: ordella_local_api_gateway
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3049
      JWT_ACCESS_SECRET: *jwt-secret
      AUTH_SERVICE_URL: http://auth-service:3051
      TENANT_SERVICE_URL: http://tenant-service:3052
      PATIENT_SERVICE_URL: http://patient-service:3053
      APPOINTMENT_SERVICE_URL: http://appointment-service:3054
      NOTES_SERVICE_URL: http://notes-service:3055
      BILLING_SERVICE_URL: http://billing-service:3056
      PAYMENT_SERVICE_URL: http://payment-service:3057
      COMMUNICATION_SERVICE_URL: http://communication-service:3058
      REPORTING_SERVICE_URL: http://reporting-service:3059
      MESSAGING_SERVICE_URL: http://messaging-service:3061
      NOTIFICATION_SERVICE_URL: http://notification-service:3062
      AI_NOTES_SERVICE_URL: http://ai-notes-service:3063
      MARKETPLACE_SERVICE_URL: http://marketplace-service:3064
      ENTERPRISE_SERVICE_URL: http://enterprise-service:3065
      ORGANIZATION_SERVICE_URL: http://organization-service:3066
      TERMINAL_SERVICE_URL: http://terminal-service:3067
      USER_ROLE_SERVICE_URL: http://user-role-service:3068
      STAFF_SERVICE_URL: http://staff-service:3069
      CORS_ORIGIN: "*"
    ports:
      - "${API_GATEWAY_PORT:-3049}:3049"
    depends_on:
      - auth-service
      - tenant-service
      - patient-service
      - appointment-service
      - notes-service
      - billing-service
      - payment-service
      - communication-service
      - reporting-service
      - messaging-service
      - notification-service
      - ai-notes-service
      - marketplace-service
      - enterprise-service
      - organization-service
      - terminal-service
      - user-role-service
      - staff-service
    networks:
      - ordella-network

  frontend-web:
    build:
      context: ../../
      dockerfile: apps/frontend-web/Dockerfile
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:3049
        NEXT_PUBLIC_DEFAULT_TENANT_ID: ${NEXT_PUBLIC_DEFAULT_TENANT_ID:-demo-tenant}
    container_name: ordella_local_frontend_web
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      PORT: 3010
      DISABLE_API_RATE_LIMIT: "true"
      NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:3049
      API_GATEWAY_INTERNAL_URL: http://api-gateway:3049
      NEXT_PUBLIC_DEFAULT_TENANT_ID: ${NEXT_PUBLIC_DEFAULT_TENANT_ID:-demo-tenant}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-demo-tenant}
      NEXTAUTH_URL: http://localhost:3010
      NEXTAUTH_SECRET: ${JWT_ACCESS_SECRET:-change-me-local-jwt-secret-min-32-chars}
    ports:
      - "${FRONTEND_WEB_PORT:-3010}:3010"
    depends_on:
      - api-gateway
    networks:
      - ordella-network

  # ---------------------------------------------------------------------------
  # Gateway load balancer (Traefik)
  # ---------------------------------------------------------------------------
  gateway-load-balancer:
    image: traefik:v3.3
    container_name: ordella_local_traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --ping=true
    ports:
      - "80:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8082}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ordella-network
    labels:
      - traefik.enable=false

  # ---------------------------------------------------------------------------
  # Observability stack
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.4
    container_name: ordella_local_loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ordella-network

  promtail:
    image: grafana/promtail:2.9.4
    container_name: ordella_local_promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - ordella-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ordella_local_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme-grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - ordella-network

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ordella_local_prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - ordella-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ordella_local_alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    depends_on:
      - prometheus
    networks:
      - ordella-network

  tempo:
    image: grafana/tempo:2.4.1
    container_name: ordella_local_tempo
    restart: unless-stopped
    ports:
      - "${TEMPO_PORT:-3200}:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - tempo_data:/var/tempo
    command:
      - -config.file=/etc/tempo.yaml
    networks:
      - ordella-network
