# Redis Stack module configuration (placeholders)
# Module behavior is primarily configured via Redis commands at runtime.
# See README.md for index, JSON, time-series, and bloom filter examples.

# -----------------------------------------------------------------------------
# RediSearch — optional indexes (logs, audit events, cached entities)
# FT.CREATE ordella:logs ...
# FT.CREATE ordella:audit ...
# FT.CREATE ordella:patients:cache ...
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# RedisJSON — document caching
# JSON.SET ordella:tenant:{tenantId}:patient:{id} $ '{...}'
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# RedisTimeSeries — service metrics
# TS.CREATE ordella:metrics:latency ...
# TS.CREATE ordella:metrics:errors ...
# TS.CREATE ordella:metrics:ingestion ...
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# RedisBloom — fast existence / idempotency
# BF.ADD ordella:bloom:events ...
# BF.ADD ordella:bloom:notifications ...
# BF.ADD ordella:bloom:emails ...
# BF.ADD ordella:bloom:idempotency ...
# -----------------------------------------------------------------------------

