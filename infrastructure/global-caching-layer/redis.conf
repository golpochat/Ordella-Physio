# Ordella Physio — Global Caching Layer (Redis Stack)
# Password is injected at runtime via docker-compose: --requirepass ${REDIS_PASSWORD}

bind 0.0.0.0
port 6379

# Memory
maxmemory 2gb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfsync everysec
dir /data
dbfilename dump.rdb

# Security / networking
protected-mode no
tcp-keepalive 300

# Databases (namespace per concern — see README)
databases 32

# Logging
loglevel notice

# Redis Stack modules
loadmodule /opt/redis-stack/lib/redisearch.so
loadmodule /opt/redis-stack/lib/rejson.so
loadmodule /opt/redis-stack/lib/redisbloom.so
loadmodule /opt/redis-stack/lib/redistimeseries.so

# Include optional Stack-specific settings
include /redis-stack.conf
