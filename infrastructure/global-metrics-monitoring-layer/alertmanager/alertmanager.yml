global:
  resolve_timeout: 5m
  smtp_smarthost: "localhost:587"
  smtp_from: "monitoring@ordella.local"

route:
  receiver: default
  group_by:
    - service
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - matchers:
        - severity = critical
      receiver: default
      repeat_interval: 1h

receivers:
  - name: default
    email_configs:
      - to: alerts@example.com
        send_resolved: true
        headers:
          Subject: "[Ordella] {{ .GroupLabels.service }} — {{ .CommonAnnotations.summary }}"
    # Placeholder for future integrations:
    # slack_configs:
    #   - api_url: https://hooks.slack.com/services/XXX
    #     channel: "#ordella-alerts"
    # webhook_configs:
    #   - url: http://notification-service:3058/internal/alerts

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal:
      - service
      - alertname
