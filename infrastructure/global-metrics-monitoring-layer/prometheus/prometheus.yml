global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    cluster: ordella-physio
    environment: development

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/recording-rules.yml
  - /etc/prometheus/rules/alert-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:3049
        labels:
          service: api-gateway

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth-service:3051
        labels:
          service: auth-service

  - job_name: tenant-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - tenant-service:3052
        labels:
          service: tenant-service

  - job_name: patient-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - patient-service:3053
        labels:
          service: patient-service

  - job_name: appointment-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - appointment-service:3054
        labels:
          service: appointment-service

  - job_name: notes-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - notes-service:3055
        labels:
          service: notes-service

  - job_name: billing-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - billing-service:3056
        labels:
          service: billing-service

  - job_name: payment-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - payment-service:3057
        labels:
          service: payment-service

  - job_name: communication-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - communication-service:3058
        labels:
          service: communication-service

  - job_name: reporting-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - reporting-service:3059
        labels:
          service: reporting-service

  - job_name: event-bus-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - event-bus-service:3060
        labels:
          service: event-bus-service

  - job_name: gateway-load-balancer
    metrics_path: /metrics
    static_configs:
      - targets:
          - traefik:8082
        labels:
          service: gateway-load-balancer

  - job_name: redis
    metrics_path: /metrics
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: redis

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: node-exporter

  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets:
          - tempo:3200
        labels:
          service: tempo

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
        labels:
          service: alertmanager
