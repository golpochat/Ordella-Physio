apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: loki
          matcherRegex: '"correlationId":"([^"]+)"'
          name: CorrelationId
          url: '$${__value.raw}'
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: ordella
