services:
  loki:
    image: grafana/loki:2.9.4
    container_name: ordella-loki
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ./loki/rules:/loki/rules:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - ordella-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:2.9.4
    container_name: ordella-promtail
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    ports:
      - "${PROMTAIL_PORT:-9080}:9080"
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - ordella-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ordella-grafana
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme-grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:${GRAFANA_PORT:-3030}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - ordella-network

volumes:
  loki-data:
    name: ordella_loki_data
  grafana-data:
    name: ordella_grafana_data

networks:
  ordella-network:
    external: true
    name: ${ORDELLA_NETWORK:-ordella_physio_backend}
