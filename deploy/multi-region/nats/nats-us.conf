# NATS JetStream leaf — US-East (federated to EU hub)
port: 4222
http_port: 8222
server_name: ordella-us-east

jetstream {
  store_dir: /data/jetstream
  max_mem: 1G
  max_file: 10G
}

leafnodes {
  remotes = [
    {
      url: "nats-leaf://leaf:${NATS_LEAF_PASSWORD}@nats.eu.ordella-physio.internal:7422"
      account: "ORDELLA"
    }
  ]
}

# Events published locally replicate to EU hub via leafnode.
# Tenant isolation enforced by ordella.events.{tenantId} subject structure.
