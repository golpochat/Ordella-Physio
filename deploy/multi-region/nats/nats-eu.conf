# NATS JetStream hub — EU-West (primary)
port: 4222
http_port: 8222
server_name: ordella-eu-west

jetstream {
  store_dir: /data/jetstream
  max_mem: 2G
  max_file: 20G
}

leafnodes {
  listen: 7422
  authorization {
    users = [
      { user: "leaf", password: "${NATS_LEAF_PASSWORD}" }
    ]
  }
}

# Regional accounts preserve tenant isolation via subject prefixes:
# ordella.events.{tenantId}.{eventType}
