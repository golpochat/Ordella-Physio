-- US-East / APAC read replica bootstrap
-- Point replica at EU primary using streaming replication.
--
-- recovery.conf / standby.signal approach (Postgres 15+):
--   primary_conninfo = 'host=postgres.eu.ordella-physio.internal port=5432 user=replicator password=...'
--   primary_slot_name = 'ordella_replica_slot'
--
-- Replicas serve read-only queries. Writes always route to EU primary
-- via API Gateway region-aware tenant routing (tenant.homeRegion).
