-- EU-West primary replication bootstrap (run after first init)
-- Creates replication user and enables WAL streaming to US/APAC replicas.

DO $$
BEGIN
  IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'replicator') THEN
    CREATE ROLE replicator WITH REPLICATION LOGIN PASSWORD 'CHANGE_ME_eu-replication-password';
  END IF;
END
$$;

