# Ordella Physio — Asia-Pacific (optional third region, read replica)
# Usage: docker compose --env-file .env.apac -f docker-compose.apac.yml up -d --build

name: ordella-physio-apac

include:
  - path: docker-compose.region.yml

networks:
  ordella-region-network:
    name: ordella-apac-network

services:
  postgres:
    container_name: ordella_apac_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/replication-replica.conf:/etc/postgresql/conf.d/replication.conf:ro
    environment:
      POSTGRES_REPLICATION_MODE: replica
      POSTGRES_PRIMARY_HOST: ${POSTGRES_PRIMARY_HOST}
      POSTGRES_PRIMARY_PORT: ${POSTGRES_PRIMARY_PORT:-5432}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}

  redis:
    container_name: ordella_apac_redis

  nats:
    container_name: ordella_apac_nats
    volumes:
      - nats_data:/data
      - ./nats/nats-apac.conf:/etc/nats/nats-server.conf:ro

  api-gateway:
    container_name: ordella_apac_api_gateway
    environment:
      ORDELLA_REGION: apac
      REGION_ROUTING_ENABLED: "true"
      REGION_ENDPOINT_EU_WEST: ${REGION_ENDPOINT_EU_WEST}
      REGION_ENDPOINT_US_EAST: ${REGION_ENDPOINT_US_EAST}
      REGION_ENDPOINT_APAC: ${REGION_ENDPOINT_APAC}
    labels:
      - traefik.enable=true
      - traefik.http.routers.apac-api.rule=Host(`${API_HOST}`)
      - traefik.http.routers.apac-api.entrypoints=websecure
      - traefik.http.routers.apac-api.tls=true
      - traefik.http.routers.apac-api.tls.certresolver=letsencrypt
      - traefik.http.services.apac-api.loadbalancer.server.port=3049
      - traefik.http.services.apac-api.loadbalancer.healthcheck.path=/health
      - traefik.http.services.apac-api.loadbalancer.healthcheck.interval=30s

  frontend-web:
    container_name: ordella_apac_frontend_web
    labels:
      - traefik.enable=true
      - traefik.http.routers.apac-frontend.rule=Host(`${FRONTEND_HOST}`)
      - traefik.http.routers.apac-frontend.entrypoints=websecure
      - traefik.http.routers.apac-frontend.tls=true
      - traefik.http.routers.apac-frontend.tls.certresolver=letsencrypt
      - traefik.http.services.apac-frontend.loadbalancer.server.port=3010

  traefik:
    container_name: ordella_apac_traefik
