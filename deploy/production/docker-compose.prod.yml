name: ordella-physio-production

# Ordella Physio — production deployment stack
# Usage: docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build

networks:
  ordella-production-network:
    name: ordella-production-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nats_data:
  loki_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  traefik_certs:
  backup_data:

x-jwt-secret: &jwt-secret ${JWT_ACCESS_SECRET}
x-postgres-user: &postgres-user ${POSTGRES_USER:-physio}
x-postgres-password: &postgres-password ${POSTGRES_PASSWORD}

x-service-health: &service-health
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 120s

x-app-resources: &app-resources
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

services:
  # ---------------------------------------------------------------------------
  # Data & messaging
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: ordella_prod_postgres
    restart: always
    environment:
      POSTGRES_USER: *postgres-user
      POSTGRES_PASSWORD: *postgres-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../infrastructure/deployment-layer/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
      - backup_data:/backups
    networks:
      - ordella-production-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-physio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  redis:
    image: redis:7
    container_name: ordella_prod_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - ordella-production-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10
    container_name: ordella_prod_nats
    restart: always
    command: ["-c", "/etc/nats/nats-server.conf"]
    volumes:
      - nats_data:/data
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
    networks:
      - ordella-production-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend microservices
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: ../../
      dockerfile: services/auth-service/Dockerfile
    container_name: ordella_prod_auth_service
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3051
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      DATABASE_URL: ${AUTH_DATABASE_URL}
      JWT_ACCESS_SECRET: *jwt-secret
      JWT_SECRET: ${JWT_SECRET}
      NATS_URL: ${NATS_URL}
      REDIS_URL: ${REDIS_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3051/auth/health"]
    <<: *app-resources

  tenant-service:
    build:
      context: ../../
      dockerfile: services/tenant-service/Dockerfile
    container_name: ordella_prod_tenant_service
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3052
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      DATABASE_URL: ${TENANT_DATABASE_URL}
      JWT_ACCESS_SECRET: *jwt-secret
      JWT_SECRET: ${JWT_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3052/tenants/health"]
    <<: *app-resources

  patient-service:
    build:
      context: ../../
      dockerfile: services/patient-service/Dockerfile
    container_name: ordella_prod_patient_service
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3053
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      DATABASE_URL: ${PATIENT_DATABASE_URL}
      JWT_ACCESS_SECRET: *jwt-secret
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3053/patients/health"]
    <<: *app-resources

  appointment-service:
    build:
      context: ../../
      dockerfile: services/appointment-service/Dockerfile
    container_name: ordella_prod_appointment_service
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3054
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      DATABASE_URL: ${APPOINTMENT_DATABASE_URL}
      JWT_ACCESS_SECRET: *jwt-secret
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3054/appointments/health"]
    <<: *app-resources

  notes-service:
    build:
      context: ../../
      dockerfile: services/notes-service/Dockerfile
    container_name: ordella_prod_notes_service
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3055
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      DATABASE_URL: ${NOTES_DATABASE_URL}
      JWT_ACCESS_SECRET: *jwt-secret
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3055/notes/health"]
    <<: *app-resources

  billing-service:
    build:
      context: ../../
      dockerfile: services/billing-service/Dockerfile
    container_name: ordella_prod_billing_service
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3056
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      DATABASE_URL: ${BILLING_DATABASE_URL}
      JWT_ACCESS_SECRET: *jwt-secret
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE}
      TENANT_SERVICE_URL: http://tenant-service:3052
      FRONTEND_URL: ${FRONTEND_URL}
      NATS_URL: ${NATS_URL}
      REDIS_URL: ${REDIS_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3056/billing/health"]
    <<: *app-resources

  payment-service:
    build:
      context: ../../
      dockerfile: services/payment-service/Dockerfile
    container_name: ordella_prod_payment_service
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3057
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      DATABASE_URL: ${PAYMENT_DATABASE_URL}
      JWT_ACCESS_SECRET: *jwt-secret
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3057/payments/health"]
    <<: *app-resources

  communication-service:
    build:
      context: ../../
      dockerfile: services/communication-service/Dockerfile
    container_name: ordella_prod_communication_service
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3058
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      DATABASE_URL: ${COMMUNICATION_DATABASE_URL}
      JWT_ACCESS_SECRET: *jwt-secret
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      EMAIL_PROVIDER_API_KEY: ${EMAIL_PROVIDER_API_KEY}
      SMS_PROVIDER_API_KEY: ${SMS_PROVIDER_API_KEY}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3058/communication/health"]
    <<: *app-resources

  reporting-service:
    build:
      context: ../../
      dockerfile: services/reporting-service/Dockerfile
    container_name: ordella_prod_reporting_service
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3059
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      DATABASE_URL: ${REPORTING_DATABASE_URL}
      JWT_ACCESS_SECRET: *jwt-secret
      NATS_URL: ${NATS_URL}
      REDIS_URL: ${REDIS_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3059/reporting/health"]
    <<: *app-resources

  messaging-service:
    build:
      context: ../../
      dockerfile: services/messaging-service/Dockerfile
    container_name: ordella_prod_messaging_service
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3061
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      DATABASE_URL: ${MESSAGING_DATABASE_URL}
      JWT_ACCESS_SECRET: *jwt-secret
      NATS_URL: ${NATS_URL}
      REDIS_URL: ${REDIS_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3061/messaging/health"]
    <<: *app-resources

  notification-service:
    build:
      context: ../../
      dockerfile: services/notification-service/Dockerfile
    container_name: ordella_prod_notification_service
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3062
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      DATABASE_URL: ${NOTIFICATION_DATABASE_URL}
      JWT_ACCESS_SECRET: *jwt-secret
      NATS_URL: ${NATS_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3062/notifications/health"]
    <<: *app-resources

  event-bus-service:
    build:
      context: ../../
      dockerfile: services/event-bus-service/Dockerfile
    container_name: ordella_prod_event_bus_service
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3060
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      DATABASE_URL: ${EVENT_BUS_DATABASE_URL}
      NATS_URL: ${NATS_URL}
      REDIS_URL: ${REDIS_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3060/event-bus/health"]
    <<: *app-resources

  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    container_name: ordella_prod_api_gateway
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3049
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      JWT_ACCESS_SECRET: *jwt-secret
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:3051
      TENANT_SERVICE_URL: http://tenant-service:3052
      PATIENT_SERVICE_URL: http://patient-service:3053
      APPOINTMENT_SERVICE_URL: http://appointment-service:3054
      NOTES_SERVICE_URL: http://notes-service:3055
      BILLING_SERVICE_URL: http://billing-service:3056
      PAYMENT_SERVICE_URL: http://payment-service:3057
      COMMUNICATION_SERVICE_URL: http://communication-service:3058
      REPORTING_SERVICE_URL: http://reporting-service:3059
      MESSAGING_SERVICE_URL: http://messaging-service:3061
      NOTIFICATION_SERVICE_URL: http://notification-service:3062
      CORS_ORIGIN: ${FRONTEND_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      auth-service:
        condition: service_healthy
      tenant-service:
        condition: service_healthy
      patient-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      notes-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      communication-service:
        condition: service_healthy
      reporting-service:
        condition: service_healthy
      messaging-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3049/health"]
    labels:
      - traefik.enable=true
      - traefik.http.routers.prod-api.rule=Host(`api.ordella-physio.com`)
      - traefik.http.routers.prod-api.entrypoints=websecure
      - traefik.http.routers.prod-api.tls=true
      - traefik.http.routers.prod-api.tls.certresolver=letsencrypt
      - traefik.http.services.prod-api.loadbalancer.server.port=3049
      - traefik.http.services.prod-api.loadbalancer.healthcheck.path=/health
      - traefik.http.services.prod-api.loadbalancer.healthcheck.interval=30s
    <<: *app-resources

  frontend-web:
    build:
      context: ../../
      dockerfile: apps/frontend-web/Dockerfile
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: ${NEXT_PUBLIC_API_GATEWAY_URL}
        NEXT_PUBLIC_DEFAULT_TENANT_ID: ${TENANT_DEFAULT}
        DEFAULT_TENANT_ID: ${TENANT_DEFAULT}
    container_name: ordella_prod_frontend_web
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3010
      NEXT_PUBLIC_APP_URL: ${FRONTEND_URL}
      NEXT_PUBLIC_API_GATEWAY_URL: ${NEXT_PUBLIC_API_GATEWAY_URL}
      NEXT_PUBLIC_DEFAULT_TENANT_ID: ${TENANT_DEFAULT}
      DEFAULT_TENANT_ID: ${TENANT_DEFAULT}
      API_GATEWAY_INTERNAL_URL: http://api-gateway:3049
      NEXTAUTH_URL: ${FRONTEND_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      <<: *service-health
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3010/"]
    labels:
      - traefik.enable=true
      - traefik.http.routers.prod-frontend.rule=Host(`ordella-physio.com`)
      - traefik.http.routers.prod-frontend.entrypoints=websecure
      - traefik.http.routers.prod-frontend.tls=true
      - traefik.http.routers.prod-frontend.tls.certresolver=letsencrypt
      - traefik.http.services.prod-frontend.loadbalancer.server.port=3010
    <<: *app-resources

  # ---------------------------------------------------------------------------
  # Reverse proxy (Traefik + Let's Encrypt auto-renewal)
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.3
    container_name: ordella_prod_traefik
    restart: always
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --ping=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=ordella-production-network
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.caserver=https://acme-v02.api.letsencrypt.org/directory
      - --log.level=WARN
      - --accesslog=true
      - --metrics.prometheus=true
    ports:
      - "80:80"
      - "443:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8082}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
    networks:
      - ordella-production-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=false

  # ---------------------------------------------------------------------------
  # Observability stack
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.4
    container_name: ordella_prod_loki
    restart: always
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ordella-production-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.4
    container_name: ordella_prod_promtail
    restart: always
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - ordella-production-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ordella_prod_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_URL}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.http.routers.prod-grafana.rule=Host(`grafana.ordella-physio.com`)
      - traefik.http.routers.prod-grafana.entrypoints=websecure
      - traefik.http.routers.prod-grafana.tls=true
      - traefik.http.routers.prod-grafana.tls.certresolver=letsencrypt
      - traefik.http.services.prod-grafana.loadbalancer.server.port=3000

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ordella_prod_prometheus
    restart: always
    volumes:
      - prometheus_data:/prometheus
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - ordella-production-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ordella_prod_alertmanager
    restart: always
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - ordella-production-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  tempo:
    image: grafana/tempo:2.4.1
    container_name: ordella_prod_tempo
    restart: always
    volumes:
      - tempo_data:/var/tempo
    command:
      - -config.file=/etc/tempo.yaml
    networks:
      - ordella-production-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Nightly Postgres backup scheduler
  # ---------------------------------------------------------------------------
  backup-scheduler:
    image: alpine:3.19
    container_name: ordella_prod_backup_scheduler
    restart: always
    environment:
      BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 2 * * *}
    volumes:
      - .:/deploy/production
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache docker-cli bash findutils
        mkdir -p /deploy/production/backups
        echo "$${BACKUP_CRON_SCHEDULE} /deploy/production/backup.sh >> /deploy/production/backups/backup.log 2>&1" > /etc/crontabs/root
        crond -f -l 2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ordella-production-network
