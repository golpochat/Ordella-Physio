name: ordella-physio

# Lightweight local development — essential services only.
# Usage: docker compose -f docker-compose.dev.yml up -d
# Rebuild only when Dockerfiles change: docker compose -f docker-compose.dev.yml build <service>

x-jwt-secret: &jwt-secret ${JWT_ACCESS_SECRET:-change-me-local-jwt-secret-min-32-chars}
x-postgres-user: &postgres-user ${POSTGRES_USER:-physio}
x-postgres-password: &postgres-password ${POSTGRES_PASSWORD:-physio}
x-gateway-urls: &gateway-urls
  AUTH_SERVICE_URL: http://core-service:3051
  TENANT_SERVICE_URL: http://tenant-service:3052
  PATIENT_SERVICE_URL: http://patient-service:3053
  APPOINTMENT_SERVICE_URL: http://appointment-service:3054
  NOTES_SERVICE_URL: http://notes-service:3055
  BILLING_SERVICE_URL: http://billing-service:3056
  PAYMENT_SERVICE_URL: http://payment-service:3057
  COMMUNICATION_SERVICE_URL: http://communication-service:3058
  REPORTING_SERVICE_URL: http://reporting-service:3059
  MESSAGING_SERVICE_URL: http://messaging-service:3061
  NOTIFICATION_SERVICE_URL: http://notification-service:3062
  AI_NOTES_SERVICE_URL: http://ai-notes-service:3063
  MARKETPLACE_SERVICE_URL: http://marketplace-service:3064
  ENTERPRISE_SERVICE_URL: http://enterprise-service:3065
  ORGANIZATION_SERVICE_URL: http://organization-service:3066
  TERMINAL_SERVICE_URL: http://terminal-service:3067
  USER_ROLE_SERVICE_URL: http://user-role-service:3068
  STAFF_SERVICE_URL: http://staff-service:3069
  AUDIT_SERVICE_URL: http://audit-service:3070
  FILE_STORAGE_SERVICE_URL: http://file-storage-service:3071
  NOTIFICATION_PROVIDER_SERVICE_URL: http://notification-provider-service:3072
  SEARCH_INDEX_SERVICE_URL: http://search-index-service:3073
  SUBSCRIPTION_BILLING_SERVICE_URL: http://subscription-billing-service:3074
  AI_SERVICE_URL: http://ai-service:3075
  AI_TRAINING_SERVICE_URL: http://ai-training-service:3076
  AI_MONITORING_SERVICE_URL: http://ai-monitoring-service:3077
  AI_DEPLOY_SERVICE_URL: http://ai-deploy-service:3078
  FEATURE_FLAGS_SERVICE_URL: http://feature-flags-service:3079
  AI_GATEWAY_SERVICE_URL: http://ai-gateway-service:3080
  AI_COST_SERVICE_URL: http://ai-cost-service:3081
  AI_SECURITY_SERVICE_URL: http://ai-security-service:3082
  AI_OBSERVABILITY_SERVICE_URL: http://ai-observability-service:3083
  AI_AGENTS_SERVICE_URL: http://ai-agents-service:3084

services:
  api-gateway:
    container_name: ordella-physio-api-gateway
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-api-gateway:latest
    ports:
      - "${API_GATEWAY_PORT:-3049}:3049"
    environment:
      PORT: 3049
      JWT_SECRET: *jwt-secret
      JWT_ACCESS_SECRET: *jwt-secret
      <<: *gateway-urls
      CORS_ORIGIN: "*"
      GATEWAY_RATE_LIMIT_IP: 5000
      GATEWAY_RATE_LIMIT_TENANT: 10000
    depends_on:
      core-service:
        condition: service_started
      tenant-service:
        condition: service_started
      patient-service:
        condition: service_started
      appointment-service:
        condition: service_started
      billing-service:
        condition: service_started
      notification-service:
        condition: service_started
      notes-service:
        condition: service_started
      messaging-service:
        condition: service_started
      marketplace-service:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
    networks:
      - ordella-physio-network

  core-service:
    container_name: ordella-physio-core-service
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-core-service:latest
    environment:
      PORT: 3051
      DATABASE_URL: postgresql://physio:physio@db:5432/ordella_auth?schema=public
      JWT_SECRET: *jwt-secret
      JWT_ACCESS_SECRET: *jwt-secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ordella-physio-network

  frontend:
    container_name: ordella-physio-frontend
    build:
      context: ./apps/frontend-web
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:3049
        NEXT_PUBLIC_DEFAULT_TENANT_ID: ${NEXT_PUBLIC_DEFAULT_TENANT_ID:-demo-tenant}
    image: ordella-physio-frontend:latest
    ports:
      - "${FRONTEND_WEB_PORT:-3010}:3010"
    environment:
      PORT: 3010
      DISABLE_API_RATE_LIMIT: "true"
      NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:3049
      API_GATEWAY_INTERNAL_URL: http://api-gateway:3049
      NEXT_PUBLIC_DEFAULT_TENANT_ID: ${NEXT_PUBLIC_DEFAULT_TENANT_ID:-demo-tenant}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-demo-tenant}
      NEXTAUTH_URL: http://localhost:3010
      NEXTAUTH_SECRET: *jwt-secret
    depends_on:
      - api-gateway
    networks:
      - ordella-physio-network

  db:
    container_name: ordella-physio-db
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: *postgres-user
      POSTGRES_PASSWORD: *postgres-password
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - ordella-physio-db-data:/var/lib/postgresql/data
      - ./infrastructure/deployment-layer/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U physio"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ordella-physio-network

  redis:
    container_name: ordella-physio-redis
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - ordella-physio-network

  tenant-service:
    container_name: ordella-physio-tenant-service
    build:
      context: ./services/tenant-service
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-tenant-service:latest
    environment:
      PORT: 3052
      DATABASE_URL: postgresql://physio:physio@db:5432/ordella_tenant?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      AUTH_SERVICE_URL: http://core-service:3051
      NATS_URL: nats://nats:4222
    depends_on:
      db:
        condition: service_healthy
      core-service:
        condition: service_started
      nats:
        condition: service_started
    networks:
      - ordella-physio-network

  nats:
    container_name: ordella-physio-nats
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - ordella-physio-network

  marketplace-service:
    container_name: ordella-physio-marketplace-service
    build:
      context: ./services/marketplace-service
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-marketplace-service:latest
    environment:
      PORT: 3064
      DATABASE_URL: postgresql://physio:physio@db:5432/ordella_marketplace?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      MARKETPLACE_OAUTH_CALLBACK_URL: http://localhost:3049/marketplace/oauth/redirect
      MARKETPLACE_FRONTEND_CALLBACK_URL: http://localhost:3010/clinic/marketplace/oauth/callback
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ordella-physio-network

  patient-service:
    container_name: ordella-physio-patient-service
    build:
      context: ./services/patient-service
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-patient-service:latest
    environment:
      PORT: 3053
      DATABASE_URL: postgresql://physio:physio@db:5432/ordella_patient?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
      NATS_URL: nats://nats:4222
    depends_on:
      db:
        condition: service_healthy
      tenant-service:
        condition: service_started
      nats:
        condition: service_started
    networks:
      - ordella-physio-network

  appointment-service:
    container_name: ordella-physio-appointment-service
    build:
      context: ./services/appointment-service
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-appointment-service:latest
    environment:
      PORT: 3054
      DATABASE_URL: postgresql://physio:physio@db:5432/ordella_appointment?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
      PATIENT_SERVICE_URL: http://patient-service:3053
      STAFF_SERVICE_URL: http://staff-service:3069
      NATS_URL: nats://nats:4222
    depends_on:
      db:
        condition: service_healthy
      tenant-service:
        condition: service_started
      patient-service:
        condition: service_started
      nats:
        condition: service_started
    networks:
      - ordella-physio-network

  billing-service:
    container_name: ordella-physio-billing-service
    build:
      context: ./services/billing-service
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-billing-service:latest
    environment:
      PORT: 3056
      DATABASE_URL: postgresql://physio:physio@db:5432/ordella_billing?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_local_dev_stripe_secret_key}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_local_dev_stripe_webhook_secret}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-price_local_starter}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-price_local_pro}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-price_local_enterprise}
      TENANT_SERVICE_URL: http://tenant-service:3052
      FRONTEND_URL: http://localhost:3010
      NATS_URL: nats://nats:4222
    depends_on:
      db:
        condition: service_healthy
      tenant-service:
        condition: service_started
      nats:
        condition: service_started
    networks:
      - ordella-physio-network

  notification-service:
    container_name: ordella-physio-notification-service
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-notification-service:latest
    environment:
      PORT: 3062
      DATABASE_URL: postgresql://physio:physio@db:5432/ordella_notification?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      NATS_URL: nats://nats:4222
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - ordella-physio-network

  notes-service:
    container_name: ordella-physio-notes-service
    build:
      context: ./services/notes-service
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-notes-service:latest
    environment:
      PORT: 3055
      DATABASE_URL: postgresql://physio:physio@db:5432/ordella_notes?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
      NATS_URL: nats://nats:4222
    depends_on:
      db:
        condition: service_healthy
      tenant-service:
        condition: service_started
      nats:
        condition: service_started
    networks:
      - ordella-physio-network

  messaging-service:
    container_name: ordella-physio-messaging-service
    build:
      context: ./services/messaging-service
      dockerfile: Dockerfile
      target: production
      additional_contexts:
        workspace: .
    image: ordella-physio-messaging-service:latest
    environment:
      PORT: 3061
      DATABASE_URL: postgresql://physio:physio@db:5432/ordella_messaging?schema=public
      JWT_ACCESS_SECRET: *jwt-secret
      TENANT_SERVICE_URL: http://tenant-service:3052
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      tenant-service:
        condition: service_started
      redis:
        condition: service_started
      nats:
        condition: service_started
    networks:
      - ordella-physio-network

# ---------------------------------------------------------
# OPTIONAL SERVICES (DISABLED BY DEFAULT)
# Uncomment only when needed
# ---------------------------------------------------------

#  search-index-service:
#    container_name: ordella-physio-search-index-service
#    build:
