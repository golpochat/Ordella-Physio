packages:
  - "apps/*"
  - "services/*"
  - "packages/*"
  - "packages/config/*"
  - "shared/*"
  - "infrastructure/*"

overrides:
  "@react-navigation/native": "7.0.14"
  "@react-navigation/bottom-tabs": "7.2.0"
  "@react-navigation/native-stack": "7.2.0"
  "@react-navigation/elements": "2.2.5"
  eslint: "^8.57.0"

packageExtensions:
  tsup@*:
    dependencies:
      picocolors: ^1.1.1
  supports-color@*:
    dependencies:
      has-flag: ^4.0.0
  next@*:
    dependencies:
      postcss: ^8.4.49
