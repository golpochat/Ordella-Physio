services:
  app:
    build:
      context: ../..
      dockerfile: apps/app/Dockerfile
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: http://host.docker.internal:4000
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      NEXT_PUBLIC_API_GATEWAY_URL: http://host.docker.internal:4000
      NEXT_PUBLIC_DEFAULT_TENANT_ID: demo-tenant
