name: ordella_mobile
description: Ordella Physio mobile application for patients, therapists, and clinic staff.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  go_router: ^12.1.3
  flutter_riverpod: ^2.4.9
  flutter_secure_storage: ^9.0.0
  dio: ^5.4.0
  uuid: ^4.2.2
  intl: ^0.18.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  web_socket_channel: ^2.4.0
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
