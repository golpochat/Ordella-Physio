services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: http://host.docker.internal:4000
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      NEXT_PUBLIC_API_GATEWAY_URL: http://host.docker.internal:4000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
